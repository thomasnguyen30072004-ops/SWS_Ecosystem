<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Sử - Hệ Thống Quản Lý Xe Tự Hành</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  </head>
  <body>
    <!-- ==================== LOGIN OVERLAY ==================== -->
    <div id="loginOverlay" class="login-overlay active">
      <div class="login-container">
        <div class="login-header">
          <h1>🚀Quản Lý Xe Tự Hành tích hợp xử lý rác</h1>
          <p>Phân Loại & Thu Gom Rác Thải Thông Minh</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Tài Khoản Quản Trị</label>
            <input
              type="text"
              id="username"
              placeholder="Nhập tài khoản"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Mật Khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>

          <button type="submit" class="login-btn">Đăng Nhập</button>
        </form>

        <div class="login-footer">
          <p>Demo: admin / 12345</p>
        </div>
      </div>
    </div>

    <!-- ==================== HISTORY PAGE ==================== -->
    <div
      id="historyPage"
      class="dashboard history-page"
      style="visibility: hidden"
    >
      <!-- Header -->
      <header class="dashboard-header">
        <div class="header-left">
          <h1>📊 Lịch Sử & Thống Kê</h1>
          <p id="systemStatus" class="system-status">● Hệ Thống: Hoạt Động</p>
        </div>
        <div class="header-right">
          <span id="userName" class="user-info"></span>
          <span id="firebaseStatus" class="firebase-status disconnected"
            >Disconnected</span
          >

          <div class="dashboard-controls">
            <button id="historyNavBtn" class="history-nav-btn">
              📊 Lịch Sử
            </button>

            <!-- Hamburger menu (adjacent to history) -->
            <button id="headerMenuBtn" class="menu-btn" aria-label="Mở menu">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </button>

            <div id="headerMenu" class="header-menu" aria-hidden="true">
              <button id="themeToggleBtn" class="menu-item">
                🌗 Chuyển giao diện
              </button>
              <button id="logoutBtn" class="menu-item">Đăng Xuất</button>
            </div>
          </div>
        </div>
      </header>

      <main class="dashboard-content" style="display: block; overflow-y: auto">
        <!-- History Section Full Page -->
        <div
          class="history-section active"
          style="max-width: 1200px; margin: 0 auto"
        >
          <div class="history-tabs">
            <button
              class="history-tab-btn active"
              data-tab="trips"
              id="tabTrips"
            >
              📍 Chuyến Đi
            </button>
            <button
              class="history-tab-btn"
              data-tab="activities"
              id="tabActivities"
            >
              📋 Hoạt Động
            </button>
            <button class="history-tab-btn" data-tab="stats" id="tabStats">
              📈 Thống Kê
            </button>
          </div>

          <!-- Tab 1: Trip History -->
          <div class="history-content active" id="tripsContent">
            <div class="history-list" id="tripsList">
              <p class="empty-message">Chưa có chuyến đi nào</p>
            </div>
          </div>

          <!-- Tab 2: Activity History -->
          <div class="history-content" id="activitiesContent">
            <div class="history-list" id="activitiesList">
              <p class="empty-message">Chưa có hoạt động nào</p>
            </div>
          </div>

          <!-- Tab 3: Statistics -->
          <div class="history-content" id="statsContent">
            <div class="stats-grid">
              <div class="stat-card">
                <label>Tổng Chuyến Đi</label>
                <span id="statTotalTrips">0</span>
              </div>
              <div class="stat-card">
                <label>Tổng Khoảng Cách</label>
                <span id="statTotalDistance">0 km</span>
              </div>
              <div class="stat-card">
                <label>Rác Thu Gom</label>
                <span id="statTotalTrash">0 kg</span>
              </div>
              <div class="stat-card">
                <label>Thời Gian Hoạt Động</label>
                <span id="statTotalTime">0 h</span>
              </div>
            </div>
          </div>

          <!-- History Actions -->
          <div class="history-actions">
            <button
              id="clearHistoryBtn"
              class="history-action-btn clear-action"
            >
              🗑️ Xóa Lịch Sử
            </button>
            <button
              id="exportHistoryBtn"
              class="history-action-btn export-action"
            >
              📥 Xuất CSV
            </button>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="dashboard-footer">
        <div class="footer-info">
          <span id="currentTime">Thời gian: --:--:--</span>
          <span id="connectionStatus" class="connection-good"
            >🔗 Kết Nối: Tốt</span
          >
          <span id="ping">Ping: -- ms</span>
        </div>
      </footer>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script src="main.js"></script>
  </body>
</html>
